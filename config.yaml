# ===========================================================================
# wm2026-growth-engine — non-secret tunable configuration
# Secrets live in .env. This file is safe to commit and edit freely.
# Anything here can be overridden per-deploy; settings.py loads it.
# ===========================================================================

project:
  name: wm2026-growth-engine
  competition: "FIFA World Cup 2026"
  language: en                       # English only, per spec
  platforms_priority:                # reach optimisation order
    - tiktok
    - youtube_shorts

video:
  width: 1080
  height: 1920
  fps: 30
  format: mp4
  codec: libx264
  pix_fmt: yuv420p
  crf: 20                            # visual quality / size tradeoff
  audio_bitrate: "160k"
  videos_per_match: 5
  target_seconds: [20, 45]           # creative target window
  hard_seconds: [15, 60]             # never outside this
  safe_margins:                      # px kept clear of TikTok/Shorts UI
    top: 220
    bottom: 360
    sides: 64
  transition_seconds: 0.35
  default_music: assets/music/default_loop.mp3   # optional; silent if missing

# Five distinct video "cuts" produced per match. Each maps to a story angle
# and a visual template so the 5 uploads don't cannibalise each other.
video_variants:
  - id: drama
    angle: drama
    template: timeline_reveal
    primary_score: emotional
  - id: controversy
    angle: controversy
    template: split_stat
    primary_score: controversy
  - id: underdog
    angle: underdog
    template: bracket_progression
    primary_score: story
  - id: star
    angle: star_moment
    template: player_card
    primary_score: viral
  - id: stat_shock
    angle: surprising_stat
    template: big_number
    primary_score: retention

# Highest-priority national teams (drives match ranking). Mirrors PRIORITY_TEAMS
# in .env; env wins if both set.
team_priority:
  - Germany
  - England
  - USA
  - Argentina
  - Brazil
  - France
  - Portugal
  - Spain

# Match ranking weights (0..1). Higher = picked sooner for content.
ranking_weights:
  team_priority: 0.30
  goals_total: 0.15
  goal_margin_drama: 0.10           # rewards both blowouts AND 1-goal thrillers
  late_drama: 0.15                  # goals/red cards after 80'
  red_cards: 0.08
  knockout_stage: 0.12
  comeback: 0.10

# Viral scoring weights — combine into the headline "viral_score".
viral_weights:
  emotional: 0.25
  story: 0.20
  retention: 0.25
  controversy: 0.15
  novelty: 0.15
min_publish_viral_score: 55         # below this, video is kept as draft, not auto-uploaded

# Story Engine angles -> emotional framing used by hook/caption/story modules.
story_angles:
  drama: "minutes from disaster, then everything changed"
  controversy: "the decision everyone is still arguing about"
  underdog: "the team nobody believed in"
  star_moment: "the player who took over the World Cup"
  surprising_stat: "a number that makes no sense"
  comeback: "dead and buried, then reborn"
  collapse: "how it all fell apart"

# Hook templates (English). hook_generator.py uses Claude first, these as fallback.
# {A}/{B} = teams, {S} = scoreline, {P} = player, {M} = minute, {N} = a number.
hook_templates:
  - "Nobody saw this coming at the World Cup..."
  - "{A} were MINUTES away from disaster..."
  - "This changes everything for {A}."
  - "The World Cup just got insane: {A} {S} {B}."
  - "The moment {A} saved its entire World Cup."
  - "No one expected THIS result: {A} {S} {B}."
  - "This broke the tournament wide open."
  - "{P} just did the impossible in the {M}th minute."
  - "The underdog nobody saw coming is {A}."
  - "This was a complete disaster for {B}."
  - "{A} {S} {B} — and it changed the whole bracket."
  - "Remember this {M}th-minute moment forever."

# Hashtag pools per platform. caption_generator builds final sets from these.
hashtags:
  core:
    - "#WorldCup2026"
    - "#FIFAWorldCup"
    - "#WorldCup"
    - "#football"
    - "#soccer"
  tiktok_extra:
    - "#footballtiktok"
    - "#fyp"
    - "#foryou"
    - "#footballedit"
    - "#soccertiktok"
  youtube_extra:
    - "#shorts"
    - "#footballshorts"
    - "#worldcupshorts"
  team_tags:
    Germany: ["#Germany", "#DieMannschaft", "#GER"]
    England: ["#England", "#ThreeLions", "#ENG"]
    USA: ["#USMNT", "#USA", "#USsoccer"]
    Argentina: ["#Argentina", "#Albiceleste", "#ARG"]
    Brazil: ["#Brazil", "#Selecao", "#BRA"]
    France: ["#France", "#LesBleus", "#FRA"]
    Portugal: ["#Portugal", "#Seleccao", "#POR"]
    Spain: ["#Spain", "#LaRoja", "#ESP"]

# Rights discovery: candidate legal/free sources, probed in order.
# See rights_discovery.py for the why/limits/API of each.
rights_sources:
  - id: youtube_cc
    enabled: true
    license: "Creative Commons (YouTube CC-BY) / officially embeddable"
    note: "Only clips explicitly marked CC or owner-embeddable. Never broadcasts."
  - id: fifa_official_embed
    enabled: true
    license: "Publisher-permitted embed (oEmbed) only"
    note: "Embeds via official player when the publisher allows it. No download."
  - id: wikimedia_commons
    enabled: true
    license: "Public Domain / CC-BY-SA"
    note: "Stadium b-roll, crowd, historical clips. Rarely live match action."
  - id: pexels_pixabay
    enabled: true
    license: "Pexels/Pixabay License (free, commercial OK)"
    note: "Generic football b-roll (boots, ball, crowd) for texture only."
  - id: sponsor_press_kits
    enabled: false
    license: "Brand-permitted press assets"
    note: "Manual allow-list; off by default."

scheduler:
  poll_interval_minutes: 15
  performance_refresh_hours: 6        # re-pull views/likes for learning loop
  max_matches_per_cycle: 6            # cap work per tick so a busy match-day can't stampede
  retry_backoff_seconds: [30, 120, 600]

learning:
  history_window_days: 30
  min_samples_to_trust: 12            # below this, use priors not learned weights
  exploration_rate: 0.15              # epsilon — keep trying non-optimal angles
